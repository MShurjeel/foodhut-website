<html>

<head>
    <title>FoodHut</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <section class="hero-gradient">
        <nav class="navbar navbar-expand-lg navbar">
            <div class="container">
                <a class="navbar-brand" href="#"><img src="assets/images/Logo.png" alt="" class="h-logo"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse menu-gap" id="navbarNav">
                    <ul class="mx-auto navbar-nav gap-3">
                        <li class="nav-item">
                            <a class="nav-link text-black" href="#">Today Special Offers</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-black" href="#">Why FoodHut</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-black" href="#">Our Menu</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-black" href="#">Our Popular Food</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-4">
                        <button class="btn btn-danger rounded-pill px-4 py-2 border-danger fw-bold">
                            Download App
                        </button>
                    </div>
                </div>
            </div>
            </div>
        </nav>

        <div class="container py-4">
            <div class="row">

                <div class=" order-2 order-lg-1 col-lg-6 col-md-12 col-12 text-start mt-lg-5">

                    <div class="d-inline-flex align-items-center rounded-pill px-2 py-1 mb-3 trust-badge-bg">
                        <div class="heart-icon-circle">
                            <i class="bi bi-heart-fill"></i>
                        </div>
                        <span class="fw-semibold text-dark" style="font-size: 0.9rem;">People Trust us</span>
                    </div>

                    <div class="d-inline-block">

                        <h1 class="display-3 fw-bold text-dark lh-sm mb-0 hero-heading">
                            We're <span class="text-danger">Serious</span>

                            <br class="d-lg-none">

                            For

                            <br class="d-none d-lg-block">

                            <span class="text-danger">Food</span> &

                            <br class="d-lg-none">

                            <span style="color: #ffca40;">Delivery</span><span class="text-dark">.</span>
                        </h1>

                        <div class="mt-2 text-end">
                            <img src="assets/images/line.png" alt="Line">
                        </div>

                    </div>
                    <div class="mt-5">Best cooks and best delivery guys all at your service.<br> Hot tasty food will
                        reach you in 60
                        minutes.</div>

                    <div class="d-flex align-items-center rounded-pill border bg-white p-1 mt-4 search-wrapper">
                        <i class="bi bi-search ms-3 fs-5 text-dark"></i>
                        <input type="text" class="form-control border-0 shadow-none bg-transparent"
                            placeholder="Search food">

                        <button
                            class="btn rounded-circle text-white d-flex align-items-center justify-content-center search-btn-custom">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    <div class="mt-3 d-flex flex-wrap align-items-center justify-content-start justify-content-lg-start gap-3">
                        <button class="btn btn-danger rounded-pill px-4 py-2 border-danger fw-bold">
                            Download App
                        </button>

                        <div class="d-flex align-items-center gap-3 ps-3 watch-video-wrapper">
                            <div
                                class="bg-white rounded-circle shadow d-flex align-items-center justify-content-center play-circle">
                                <i class="bi bi-play-fill fs-3 text-danger"></i>
                            </div>
                            <span class="fw-bold text-secondary">Watch Video</span>
                        </div>
                    </div>
                    
                    <div class="d-none d-md-block"> <img src="assets/images/slider.png" class="mt-4" alt=""> </div>
                </div>


                <div class="order-1 order-lg-2 col-lg-6 col-md-6 col-12 mb-5 mb-lg-0">
                    <img src="assets/images/heroimage.png" alt="Logo" class="img-fluid">
                </div>
            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
